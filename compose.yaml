services:
  omnivoice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnivoice-tts
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
      - "10200:10200"
    volumes:
      - ./app:/app
      - ./samples:/samples
      - ./outputs:/tmp/gradio
      - ./model:/model
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HF_HOME=/model
      - HF_TOKEN
      - OMNIVOICE_MODEL=k2-fsa/OmniVoice
      - OMNIVOICE_DEVICE=cuda:0
      - OMNIVOICE_DTYPE=float16
      - OMNIVOICE_SAMPLES_DIR=/samples
      - OMNIVOICE_HOST=0.0.0.0
      - OMNIVOICE_PORT=8000
      - OMNIVOICE_OUTPUT_FORMAT=wav
      - OMNIVOICE_GRADIO_ENABLED=true
      - OMNIVOICE_GRADIO_PORT=8001
      - OMNIVOICE_WYOMING_ENABLED=true
      - OMNIVOICE_WYOMING_HOST=0.0.0.0
      - OMNIVOICE_WYOMING_PORT=10200
      - OMNIVOICE_WS_ENABLED=true
      - OMNIVOICE_WS_DEFAULT_NUM_STEP=16
      - OMNIVOICE_WS_MAX_SENTENCE_CHARS=150
      - OMNIVOICE_WS_MIN_SENTENCE_CHARS=20
      - OMNIVOICE_WS_BUFFER_TIMEOUT_MS=2000
      - OMNIVOICE_CONVERSATION_WS_ENABLED=true
      - OMNIVOICE_OLLAMA_HOST=http://host.docker.internal:8010
      - OMNIVOICE_OLLAMA_MODEL=hermes3:8b
      - OMNIVOICE_CONVERSATION_WARMUP_ENABLED=true
      - OMNIVOICE_ASR_LANGUAGE_STICKY_MIN_PROB=0.8
      
      # Uncomment for local model:
      # - OMNIVOICE_MODEL=/models/OmniVoice
      # Uncomment for HuggingFace mirror:
      # - HF_ENDPOINT=https://hf-mirror.com
      # Uncomment to override Wyoming advertised languages (comma-separated ISO 639-1):
      # - OMNIVOICE_WYOMING_LANGUAGES=en,ru,de
      # Uncomment to enable API key authentication:
      # - OMNIVOICE_API_KEY=${OMNIVOICE_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
